<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Cleanforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1EA7E1', groupPrimary: '#000080' } } }
        }
    </script>
    <style>body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-groupPrimary text-white flex flex-col shadow-xl z-20">
        <div class="h-20 flex items-center justify-center border-b border-white/10">
            <h1 class="text-xl font-bold tracking-widest uppercase">CF Admin</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="switchTab('bookings')" id="tab-bookings" class="w-full flex items-center gap-3 px-4 py-3 bg-white/10 rounded-xl font-bold text-sm transition text-left">
                <i class="fa-solid fa-calendar-check w-5 text-center"></i> รายการจอง (Bookings)
            </button>
            <button onclick="switchTab('services')" id="tab-services" class="w-full flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/5 rounded-xl font-bold text-sm transition text-left">
                <i class="fa-solid fa-tags w-5 text-center"></i> จัดการราคา (Pricing)
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 text-gray-300 rounded-xl font-bold text-sm opacity-50 cursor-not-allowed text-left">
                <i class="fa-solid fa-newspaper w-5 text-center"></i> ข่าวสาร (News & Promo)
            </button>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button id="logout-btn" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg text-sm font-bold transition">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 border-b border-gray-100 z-10">
            <h2 id="page-title" class="text-2xl font-bold text-gray-800">รายการจองล่าสุด</h2>
            <div class="flex items-center gap-4">
                <span id="admin-name" class="text-sm font-bold text-gray-600">กำลังโหลด...</span>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto">
            
            <div id="view-bookings" class="block">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100 uppercase text-[10px] tracking-wider">
                                <tr>
                                    <th class="px-6 py-4 font-bold">วันที่จองเข้ามา</th>
                                    <th class="px-6 py-4 font-bold">ลูกค้า</th>
                                    <th class="px-6 py-4 font-bold">บริการ</th>
                                    <th class="px-6 py-4 font-bold">ยอดสุทธิ</th>
                                </tr>
                            </thead>
                            <tbody id="bookings-table-body" class="divide-y divide-gray-100">
                                <tr><td colspan="4" class="px-6 py-12 text-center text-gray-400">กำลังดึงข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-services" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-gray-500">จัดการเพิ่ม ลบ หรือแก้ไขราคาบริการต่างๆ ที่จะแสดงบนหน้าเว็บลูกค้า</p>
                    <button onclick="openServiceModal()" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> เพิ่มบริการใหม่
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100 uppercase text-[10px] tracking-wider">
                                <tr>
                                    <th class="px-6 py-4 font-bold">ชื่อบริการ</th>
                                    <th class="px-6 py-4 font-bold">หมวดหมู่</th>
                                    <th class="px-6 py-4 font-bold">ราคา (บาท)</th>
                                    <th class="px-6 py-4 font-bold">สถานะ</th>
                                    <th class="px-6 py-4 font-bold text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="services-table-body" class="divide-y divide-gray-100">
                                <tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">กำลังดึงข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="service-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h3 id="modal-title" class="text-xl font-bold mb-6">เพิ่มบริการใหม่</h3>
            <input type="hidden" id="srv-id">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ชื่อบริการ</label>
                    <input type="text" id="srv-name" class="w-full border border-gray-200 rounded-lg p-2 text-sm outline-none focus:border-primary" placeholder="เช่น ซักโซฟา (Deep Clean)">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">หมวดหมู่</label>
                    <select id="srv-type" class="w-full border border-gray-200 rounded-lg p-2 text-sm outline-none focus:border-primary">
                        <option value="house">บริการทำความสะอาดบ้าน</option>
                        <option value="furniture">บริการทำความสะอาดเฟอร์นิเจอร์</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">ราคา</label>
                        <input type="number" id="srv-price" class="w-full border border-gray-200 rounded-lg p-2 text-sm outline-none focus:border-primary" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">หน่วย (เช่น ตร.ม., ผืน)</label>
                        <input type="text" id="srv-unit" class="w-full border border-gray-200 rounded-lg p-2 text-sm outline-none focus:border-primary" placeholder="ตร.ม.">
                    </div>
                </div>
                <div class="flex items-center gap-2 mt-4">
                    <input type="checkbox" id="srv-active" checked class="w-4 h-4 text-primary">
                    <label for="srv-active" class="text-sm font-bold text-gray-700">เปิดใช้งาน (แสดงบนเว็บ)</label>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeServiceModal()" class="px-4 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition">ยกเลิก</button>
                <button onclick="saveService()" id="btn-save-srv" class="px-4 py-2 bg-primary text-white font-bold rounded-lg hover:bg-blue-600 transition">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Config (ใส่ของคุณ)
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. ควบคุมการเปลี่ยน Tab
        function switchTab(tabName) {
            document.getElementById('view-bookings').classList.add('hidden');
            document.getElementById('view-services').classList.add('hidden');
            
            document.getElementById('tab-bookings').classList.replace('bg-white/10', 'hover:bg-white/5');
            document.getElementById('tab-bookings').classList.replace('text-white', 'text-gray-300');
            document.getElementById('tab-services').classList.replace('bg-white/10', 'hover:bg-white/5');
            document.getElementById('tab-services').classList.replace('text-white', 'text-gray-300');

            if(tabName === 'bookings') {
                document.getElementById('view-bookings').classList.remove('hidden');
                document.getElementById('tab-bookings').classList.replace('hover:bg-white/5', 'bg-white/10');
                document.getElementById('tab-bookings').classList.replace('text-gray-300', 'text-white');
                document.getElementById('page-title').textContent = "รายการจองล่าสุด";
            } else if (tabName === 'services') {
                document.getElementById('view-services').classList.remove('hidden');
                document.getElementById('tab-services').classList.replace('hover:bg-white/5', 'bg-white/10');
                document.getElementById('tab-services').classList.replace('text-gray-300', 'text-white');
                document.getElementById('page-title').textContent = "จัดการบริการและราคา";
                fetchServices(); // ดึงข้อมูลบริการ
            }
        }

        // 3. ฟังก์ชันดึงบริการ (Read)
        async function fetchServices() {
            const tableBody = document.getElementById('services-table-body');
            try {
                const snapshot = await db.collection("services").get();
                if (snapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">ยังไม่มีข้อมูลบริการ</td></tr>';
                    return;
                }

                let htmlContent = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const statusBadge = data.isActive 
                        ? '<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">เปิดใช้งาน</span>'
                        : '<span class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-[10px] font-bold">ปิดชั่วคราว</span>';
                    
                    const typeName = data.type === 'house' ? 'บ้าน' : 'เฟอร์นิเจอร์';

                    // บีบอัด Data ส่งไปตอนกดแก้ไข
                    const dataString = encodeURIComponent(JSON.stringify({id: doc.id, ...data}));

                    htmlContent += `
                        <tr class="hover:bg-gray-50 border-b border-gray-50">
                            <td class="px-6 py-4 font-bold text-gray-800">${data.name}</td>
                            <td class="px-6 py-4 text-xs text-gray-500">${typeName}</td>
                            <td class="px-6 py-4 font-bold text-primary">${data.price} <span class="text-xs text-gray-400 font-normal">/${data.unit}</span></td>
                            <td class="px-6 py-4">${statusBadge}</td>
                            <td class="px-6 py-4 text-center">
                                <button onclick="editService('${dataString}')" class="text-blue-500 hover:text-blue-700 mr-3"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteService('${doc.id}', '${data.name}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                });
                tableBody.innerHTML = htmlContent;
            } catch (error) {
                console.error(error);
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">ดึงข้อมูลล้มเหลว</td></tr>';
            }
        }

        // 4. Modal เพิ่ม/แก้ไข (Create & Update)
        function openServiceModal() {
            document.getElementById('srv-id').value = "";
            document.getElementById('srv-name').value = "";
            document.getElementById('srv-price').value = "";
            document.getElementById('srv-unit').value = "";
            document.getElementById('srv-active').checked = true;
            document.getElementById('modal-title').textContent = "เพิ่มบริการใหม่";
            document.getElementById('service-modal').classList.remove('hidden');
        }

        function closeServiceModal() {
            document.getElementById('service-modal').classList.add('hidden');
        }

        function editService(encodedData) {
            const data = JSON.parse(decodeURIComponent(encodedData));
            document.getElementById('srv-id').value = data.id;
            document.getElementById('srv-name').value = data.name;
            document.getElementById('srv-type').value = data.type;
            document.getElementById('srv-price').value = data.price;
            document.getElementById('srv-unit').value = data.unit;
            document.getElementById('srv-active').checked = data.isActive;
            document.getElementById('modal-title').textContent = "แก้ไขข้อมูลบริการ";
            document.getElementById('service-modal').classList.remove('hidden');
        }

        async function saveService() {
            const id = document.getElementById('srv-id').value;
            const data = {
                name: document.getElementById('srv-name').value,
                type: document.getElementById('srv-type').value,
                price: Number(document.getElementById('srv-price').value),
                unit: document.getElementById('srv-unit').value,
                isActive: document.getElementById('srv-active').checked
            };

            if(!data.name || !data.price) { alert("กรุณากรอกชื่อและราคาให้ครบถ้วน"); return; }

            const btn = document.getElementById('btn-save-srv');
            btn.innerHTML = "กำลังบันทึก..."; btn.disabled = true;

            try {
                if(id) {
                    await db.collection("services").doc(id).update(data); // แก้ไข
                } else {
                    await db.collection("services").add(data); // เพิ่มใหม่
                }
                closeServiceModal();
                fetchServices(); // รีเฟรชตาราง
            } catch (error) {
                console.error(error); alert("เกิดข้อผิดพลาด");
            } finally {
                btn.innerHTML = "บันทึกข้อมูล"; btn.disabled = false;
            }
        }

        // 5. ฟังก์ชันลบ (Delete)
        async function deleteService(id, name) {
            if(confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบบริการ "${name}" ออกจากระบบ?`)) {
                try {
                    await db.collection("services").doc(id).delete();
                    fetchServices();
                } catch (error) {
                    console.error(error); alert("ลบข้อมูลไม่สำเร็จ");
                }
            }
        }
    </script>
</body>
</html>
