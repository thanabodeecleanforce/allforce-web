<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Cleanforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1EA7E1', groupPrimary: '#000080' } } }
        }
    </script>
    <style>body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-groupPrimary text-white flex flex-col shadow-xl z-20 shrink-0">
        <div class="h-20 flex items-center justify-center border-b border-white/10">
            <h1 class="text-xl font-bold tracking-widest uppercase">CF Admin</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="switchTab('bookings')" id="tab-bookings" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/5 text-gray-300 rounded-xl font-bold text-sm transition text-left">
                <i class="fa-solid fa-calendar-check w-5 text-center"></i> รายการจอง (Bookings)
            </button>
            <button onclick="switchTab('services')" id="tab-services" class="w-full flex items-center gap-3 px-4 py-3 bg-white/10 text-white rounded-xl font-bold text-sm transition text-left">
                <i class="fa-solid fa-tags w-5 text-center"></i> จัดการราคา (Pricing)
            </button>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button id="logout-btn" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg text-sm font-bold transition">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 border-b border-gray-100 z-10 shrink-0">
            <h2 id="page-title" class="text-2xl font-bold text-gray-800">จัดการบริการและราคา</h2>
            <div class="flex items-center gap-4">
                <span id="admin-name" class="text-sm font-bold text-gray-600">กำลังโหลด...</span>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto">
            <div id="view-bookings" class="hidden">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center text-gray-400">
                    <p>ระบบจัดการรายการจองกำลังอยู่ในระหว่างการปรับปรุง</p>
                </div>
            </div>

            <div id="view-services" class="block">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-gray-500">จัดการรายละเอียด ราคา ลำดับการแสดงผล และเงื่อนไขสัตว์เลี้ยง</p>
                    <button onclick="openServiceModal()" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> เพิ่มบริการใหม่
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100 uppercase text-[10px] tracking-wider">
                                <tr>
                                    <th class="px-6 py-4 font-bold text-center">ลำดับ</th>
                                    <th class="px-6 py-4 font-bold">ชื่อบริการ / รายละเอียด</th>
                                    <th class="px-6 py-4 font-bold">หมวดหมู่</th>
                                    <th class="px-6 py-4 font-bold">ราคาเริ่มต้น</th>
                                    <th class="px-6 py-4 font-bold">สถานะ</th>
                                    <th class="px-6 py-4 font-bold text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="services-table-body" class="divide-y divide-gray-100">
                                <tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">กำลังดึงข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="service-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto py-10">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl my-auto">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-groupPrimary border-b pb-3">เพิ่มบริการใหม่</h3>
            <input type="hidden" id="srv-id">
            
            <div class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold text-gray-600 mb-1">ชื่อแพ็กเกจ/บริการ <span class="text-red-500">*</span></label>
                        <input type="text" id="srv-name" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm outline-none focus:border-primary" placeholder="เช่น คอนโด 1 ห้องนอน (30 ตร.ม.)">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">ลำดับแสดงผล</label>
                        <input type="number" id="srv-order" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm outline-none focus:border-primary font-bold text-center text-primary" placeholder="1, 2, 3...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">หมวดหมู่ (สำคัญมาก!) <span class="text-red-500">*</span></label>
                    <select id="srv-type" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm outline-none focus:border-primary bg-blue-50">
                        <option value="condo">📍 ทำความสะอาด: คอนโด</option>
                        <option value="house_single">📍 ทำความสะอาด: บ้านเดี่ยว</option>
                        <option value="villa">📍 ทำความสะอาด: วิลล่า</option>
                        <option value="furniture">🛋️ บริการ: เฟอร์นิเจอร์</option>
                        <option value="addon">✨ บริการเสริม (Add-on)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">รายละเอียด (สเปกงาน)</label>
                    <textarea id="srv-details" rows="2" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm outline-none focus:border-primary" placeholder="เช่น แม่บ้าน 2 คน / ทำงาน 4 ชม."></textarea>
                </div>

                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-primary mb-1">ราคาปกติ (ไม่มีสัตว์เลี้ยง) <span class="text-red-500">*</span></label>
                        <input type="number" id="srv-price" class="w-full border border-blue-200 rounded-lg p-2.5 text-sm font-bold text-primary outline-none focus:border-primary" placeholder="เช่น 2690">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-orange-500 mb-1">บวกเพิ่มกรณีมี "สัตว์เลี้ยง" (บาท)</label>
                        <input type="number" id="srv-pet-surcharge" class="w-full border border-orange-200 rounded-lg p-2.5 text-sm text-orange-600 outline-none focus:border-orange-400" placeholder="เช่น 300 (เว้นว่าง = ไม่บวกเพิ่ม)">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">ราคาเต็ม (เพื่อขีดทิ้ง / ตัวหนังสือสีเทา)</label>
                        <input type="number" id="srv-original-price" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm text-gray-500" placeholder="เช่น 3090 (เว้นว่างได้)">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">หน่วยนับ</label>
                        <input type="text" id="srv-unit" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm" placeholder="เช่น เหมา, ตร.ม.">
                    </div>
                </div>

                <div class="flex items-center gap-2 pt-2 border-t border-gray-100">
                    <input type="checkbox" id="srv-active" checked class="w-5 h-5 text-primary rounded cursor-pointer">
                    <label for="srv-active" class="text-sm font-bold text-gray-700 cursor-pointer">เปิดใช้งาน (ให้ลูกค้ากดจองได้บนเว็บ)</label>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeServiceModal()" class="px-6 py-2.5 text-gray-500 font-bold hover:bg-gray-100 rounded-xl transition">ยกเลิก</button>
                <button onclick="saveService()" id="btn-save-srv" class="px-6 py-2.5 bg-primary text-white font-bold rounded-xl hover:bg-blue-600 transition shadow-md">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ⚠️ ระบบรักษาความปลอดภัย: เปลี่ยนเป็นอีเมลของคุณ
        const ALLOWED_ADMIN_EMAILS = ["your.email@gmail.com", "admin@allforce.com"];

        auth.onAuthStateChanged((user) => {
            if (user) {
                // ถ้าปิดระบบล็อกอีเมลชั่วคราว ให้คอมเมนต์ if ด้านล่างนี้ทิ้งได้เลยครับ
                // if (!ALLOWED_ADMIN_EMAILS.includes(user.email)) {
                //    alert("ไม่มีสิทธิ์เข้าถึงหน้าระบบหลังบ้าน!");
                //    window.location.href = "index.html"; return;
                // }
                document.getElementById('admin-name').textContent = "ผู้ดูแล: " + (user.displayName || user.email);
                fetchServices(); 
            } else {
                window.location.href = "login.html";
            }
        });

        function switchTab(tabName) {
            document.getElementById('view-bookings').classList.add('hidden');
            document.getElementById('view-services').classList.add('hidden');
            document.getElementById('tab-bookings').classList.replace('bg-white/10', 'hover:bg-white/5');
            document.getElementById('tab-bookings').classList.replace('text-white', 'text-gray-300');
            document.getElementById('tab-services').classList.replace('bg-white/10', 'hover:bg-white/5');
            document.getElementById('tab-services').classList.replace('text-white', 'text-gray-300');

            if(tabName === 'bookings') {
                document.getElementById('view-bookings').classList.remove('hidden');
                document.getElementById('tab-bookings').classList.replace('hover:bg-white/5', 'bg-white/10');
                document.getElementById('tab-bookings').classList.replace('text-gray-300', 'text-white');
                document.getElementById('page-title').textContent = "รายการจองล่าสุด";
            } else if (tabName === 'services') {
                document.getElementById('view-services').classList.remove('hidden');
                document.getElementById('tab-services').classList.replace('hover:bg-white/5', 'bg-white/10');
                document.getElementById('tab-services').classList.replace('text-gray-300', 'text-white');
                document.getElementById('page-title').textContent = "จัดการบริการและราคา";
                fetchServices();
            }
        }

        async function fetchServices() {
            const tableBody = document.getElementById('services-table-body');
            try {
                // โหลดข้อมูลทั้งหมดมาจัดเรียงผ่าน JavaScript
                const snapshot = await db.collection("services").get();
                if (snapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">ยังไม่มีข้อมูล กดปุ่มเพิ่มบริการใหม่ได้เลยครับ</td></tr>';
                    return;
                }

                let services = [];
                snapshot.forEach(doc => {
                    services.push({ id: doc.id, ...doc.data() });
                });

                // การเรียงลำดับ: เรียงหมวดหมู่ก่อน -> ตามด้วยลำดับตัวเลข
                services.sort((a, b) => {
                    const typeA = a.type || '';
                    const typeB = b.type || '';
                    if (typeA < typeB) return -1;
                    if (typeA > typeB) return 1;
                    
                    // ถ้าหมวดหมู่ตรงกัน ให้เรียงตามตัวเลข order (ถ้าไม่มีให้ไปอยู่ท้ายๆ)
                    return (a.order || 99) - (b.order || 99);
                });

                let htmlContent = '';
                services.forEach(data => {
                    const statusBadge = data.isActive 
                        ? '<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">เปิดใช้งาน</span>'
                        : '<span class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-[10px] font-bold">ปิดชั่วคราว</span>';
                    
                    let typeName = 'คอนโด';
                    if(data.type === 'house_single') typeName = 'บ้านเดี่ยว';
                    if(data.type === 'villa') typeName = 'วิลล่า';
                    if(data.type === 'furniture') typeName = 'เฟอร์นิเจอร์';
                    if(data.type === 'addon') typeName = 'บริการเสริม';

                    let petBadge = data.petSurcharge ? `<span class="bg-orange-100 text-orange-600 px-2 py-0.5 rounded text-[9px] font-bold ml-2">+ สัตว์เลี้ยง ${data.petSurcharge} ฿</span>` : '';
                    let orderDisplay = data.order ? data.order : '-';
                    
                    const dataString = encodeURIComponent(JSON.stringify(data));

                    htmlContent += `
                        <tr class="hover:bg-gray-50 border-b border-gray-50 align-top">
                            <td class="px-6 py-4 text-center font-bold text-gray-400">${orderDisplay}</td>
                            <td class="px-6 py-4">
                                <div class="font-bold text-gray-800">${data.name}</div>
                                <div class="text-[10px] text-gray-500 mt-1">${data.details || '-'}</div>
                            </td>
                            <td class="px-6 py-4 text-xs font-bold text-blue-600 mt-1">${typeName}</td>
                            <td class="px-6 py-4 font-bold text-primary text-base">
                                ${data.price.toLocaleString()} ฿
                                ${petBadge}
                            </td>
                            <td class="px-6 py-4">${statusBadge}</td>
                            <td class="px-6 py-4 text-center">
                                <button onclick="editService('${dataString}')" class="text-blue-500 hover:text-blue-700 mr-3"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteService('${data.id}', '${data.name}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                });
                tableBody.innerHTML = htmlContent;
            } catch (error) {
                console.error(error);
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-red-500">ดึงข้อมูลล้มเหลว</td></tr>';
            }
        }

        function openServiceModal() {
            document.getElementById('srv-id').value = "";
            document.getElementById('srv-name').value = "";
            document.getElementById('srv-order').value = "1"; // ค่าเริ่มต้น
            document.getElementById('srv-type').value = "condo";
            document.getElementById('srv-details').value = "";
            document.getElementById('srv-price').value = "";
            document.getElementById('srv-pet-surcharge').value = "";
            document.getElementById('srv-original-price').value = "";
            document.getElementById('srv-unit').value = "";
            document.getElementById('srv-active').checked = true;
            
            document.getElementById('modal-title').textContent = "เพิ่มบริการใหม่";
            document.getElementById('service-modal').classList.remove('hidden');
        }

        function closeServiceModal() {
            document.getElementById('service-modal').classList.add('hidden');
        }

        function editService(encodedData) {
            const data = JSON.parse(decodeURIComponent(encodedData));
            document.getElementById('srv-id').value = data.id;
            document.getElementById('srv-name').value = data.name;
            document.getElementById('srv-order').value = data.order || ""; // ดึงลำดับมาโชว์
            document.getElementById('srv-type').value = data.type === 'house' ? 'house_single' : (data.type || "condo");
            document.getElementById('srv-details').value = data.details || "";
            document.getElementById('srv-price').value = data.price;
            document.getElementById('srv-pet-surcharge').value = data.petSurcharge || "";
            document.getElementById('srv-original-price').value = data.originalPrice || "";
            document.getElementById('srv-unit').value = data.unit || "";
            document.getElementById('srv-active').checked = data.isActive;
            
            document.getElementById('modal-title').textContent = "แก้ไขข้อมูลบริการ";
            document.getElementById('service-modal').classList.remove('hidden');
        }

        async function saveService() {
            const id = document.getElementById('srv-id').value;
            const priceVal = Number(document.getElementById('srv-price').value);
            const orderVal = document.getElementById('srv-order').value ? Number(document.getElementById('srv-order').value) : 99; // ถ้าไม่ใส่ ให้ไปอยู่ท้ายสุด
            const petSurVal = document.getElementById('srv-pet-surcharge').value ? Number(document.getElementById('srv-pet-surcharge').value) : 0;
            const origPriceVal = document.getElementById('srv-original-price').value ? Number(document.getElementById('srv-original-price').value) : null;

            const data = {
                name: document.getElementById('srv-name').value.trim(),
                order: orderVal, // บันทึกลำดับลงฐานข้อมูล
                type: document.getElementById('srv-type').value,
                details: document.getElementById('srv-details').value.trim(),
                price: priceVal,
                petSurcharge: petSurVal,
                originalPrice: origPriceVal,
                unit: document.getElementById('srv-unit').value.trim(),
                isActive: document.getElementById('srv-active').checked
            };

            if(!data.name || isNaN(data.price) || data.price <= 0) { 
                alert("กรุณากรอก 'ชื่อแพ็กเกจ' และ 'ราคาปกติ' ให้ถูกต้องครับ"); return; 
            }

            const btn = document.getElementById('btn-save-srv');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...'; 
            btn.disabled = true;

            try {
                if(id) {
                    await db.collection("services").doc(id).update(data);
                } else {
                    await db.collection("services").add(data);
                }
                closeServiceModal();
                fetchServices();
            } catch (error) {
                console.error("Save Error: ", error); 
                alert("เกิดข้อผิดพลาดในการบันทึกครับ");
            } finally {
                btn.innerHTML = "บันทึกข้อมูล"; 
                btn.disabled = false;
            }
        }

        async function deleteService(id, name) {
            if(confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบ "${name}" ออกจากระบบถาวร?`)) {
                try {
                    await db.collection("services").doc(id).delete();
                    fetchServices();
                } catch (error) {
                    console.error(error); alert("ลบข้อมูลไม่สำเร็จ");
                }
            }
        }
        
        document.getElementById('logout-btn').onclick = function() {
            if(confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                auth.signOut().then(() => { window.location.href = 'login.html'; });
            }
        };
    </script>
</body>
</html>
