    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1EA7E1', background: '#F3F7FB', text: '#0F172A', groupPrimary: '#000080' }, fontFamily: { heading: ['Poppins', 'Noto Sans Thai', 'sans-serif'], body: ['Noto Sans Thai', 'sans-serif'] } } }

    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #F3F7FB; }
* { -webkit-tap-highlight-color: transparent; }

.link-card { 
    transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2); 
    will-change: transform, box-shadow; 
    position: relative; 
    overflow: hidden; 
}

@media (hover: hover) { 
    .link-card:hover { 
        transform: translateY(-4px) scale(1.03); 
        box-shadow: 0 20px 30px -5px rgba(0,0,0,0.15), inset 0 0 15px rgba(255,255,255,0.4); 
    } 
}
.link-card:active { 
    transform: scale(0.92) translateY(2px) !important; 
    box-shadow: 0 5px 10px -5px rgba(0,0,0,0.1) !important; 
    filter: brightness(0.95); 
}

/* 🌟 เอฟเฟกต์แสงวิ่งว้าบเดียว */
@keyframes shine-sweep {
    0% { left: -150%; opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { left: 150%; opacity: 0; }
}

/* องค์ประกอบของแสงที่ซ่อนรอไว้ในปุ่ม */
.link-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%; /* ซ่อนไว้ทางซ้าย */
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg);
    z-index: 20;
    pointer-events: none;
}

/* 1. เมื่อเอาเมาส์ชี้ หรือ เอานิ้วกด ให้เล่นแสงว้าบเดียว (forwards เพื่อให้หยุดที่เฟรมสุดท้าย ไม่กระตุกกลับ) */
.link-card:hover::after,
.link-card:active::after {
    animation: shine-sweep 0.7s ease-in-out forwards;
}

/* 2. คลาสสำหรับตอนเลื่อนจอ (จะถูกดึงมาใช้ร่วมกับ JavaScript) */
.link-card.scrolling-shine::after {
    animation: shine-sweep 0.7s ease-in-out forwards;
}

.link-card i { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 2; }
.link-card:hover i, .link-card:active i { transform: scale(1.25) rotate(8deg); }
.link-card span { position: relative; z-index: 2; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-6 font-body relative overflow-x-hidden">

    <div id="dynamic-bg" class="fixed inset-0 z-0 opacity-40 bg-[url('hero-bg.jpg')] bg-cover bg-center bg-no-repeat pointer-events-none transition-all duration-1000"></div>
    <div class="fixed inset-0 z-0 bg-gradient-to-b from-white/60 to-[#F3F7FB] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md flex flex-col items-center">
        <div class="w-full text-center mb-10 animate-in slide-in-from-top-4 duration-500">
            <div class="w-28 h-28 mx-auto bg-white rounded-full p-2 shadow-[0_0_20px_rgba(30,167,225,0.2)] mb-4 border-2 border-primary/20 relative">
                <img src="logo-cleanforce.png" alt="Cleanforce" class="w-full h-full object-contain rounded-full" onerror="this.src='https://placehold.co/100x100?text=CF'">
                <div class="absolute bottom-1 right-1 w-6 h-6 bg-green-500 border-2 border-white rounded-full animate-pulse"></div>
            </div>
            <h1 class="text-3xl font-bold text-[#000080] font-heading">Cleanforce</h1>
            <p class="text-sm text-gray-500 mt-1 font-medium bg-white/60 inline-block px-4 py-1 rounded-full shadow-sm border border-white">บริการทำความสะอาดพรีเมียม</p>
        </div>

        <div id="links-container" class="w-full space-y-4 mb-8">
            <div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>กำลังโหลดช่องทางการติดต่อ...</div>
        </div>

        <footer class="mt-16 pt-8 text-center w-full border-t border-gray-200/50">
            <a href="cleanforce.html" class="inline-flex items-center gap-2 bg-white text-gray-600 px-6 py-3 rounded-full shadow-sm hover:text-primary hover:shadow-md transition font-bold text-sm mb-4 border border-gray-100">
                <i class="fa-solid fa-house"></i> ไปที่เว็ป Cleanforce
            </a>
            <p class="text-gray-400 text-[10px] font-medium">© 2026 Cleanforce. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 🌟 รวมไอคอนแอปยอดฮิต เพื่อความสวยงาม (สีและโลโก้เป๊ะๆ)
        const appPresets = {
            'line': { bg: 'bg-[#00B900]', icon: '<i class="fa-brands fa-line text-3xl"></i>', border: 'border-[#00B900]/50' },
            'wa': { bg: 'bg-[#25D366]', icon: '<i class="fa-brands fa-whatsapp text-3xl"></i>', border: 'border-[#25D366]/50' },
            'wechat': { bg: 'bg-[#07C160]', icon: '<i class="fa-brands fa-weixin text-3xl"></i>', border: 'border-[#07C160]/50' },
            'tg': { bg: 'bg-[#0088cc]', icon: '<i class="fa-brands fa-telegram text-3xl"></i>', border: 'border-[#0088cc]/50' },
            'fb': { bg: 'bg-[#1877F2]', icon: '<i class="fa-brands fa-facebook text-3xl"></i>', border: 'border-[#1877F2]/50' },
            'ig': { bg: 'bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500', icon: '<i class="fa-brands fa-instagram text-3xl"></i>', border: 'border-pink-500/50' },
            'tiktok': { bg: 'bg-black', icon: '<i class="fa-brands fa-tiktok text-2xl"></i>', border: 'border-gray-800/50' },
            'yt': { bg: 'bg-[#FF0000]', icon: '<i class="fa-brands fa-youtube text-2xl"></i>', border: 'border-red-500/50' },
            'linkedin': { bg: 'bg-[#0A66C2]', icon: '<i class="fa-brands fa-linkedin text-2xl"></i>', border: 'border-[#0A66C2]/50' },
            'lemon8': { bg: 'bg-yellow-400', icon: '<i class="fa-solid fa-lemon text-2xl text-gray-800"></i>', border: 'border-yellow-400/50' },
            'vk': { bg: 'bg-[#0077FF]', icon: '<i class="fa-brands fa-vk text-2xl"></i>', border: 'border-[#0077FF]/50' },
            'viber': { bg: 'bg-[#7360F2]', icon: '<i class="fa-brands fa-viber text-2xl"></i>', border: 'border-[#7360F2]/50' },
            'kakao': { bg: 'bg-[#FEE500]', icon: '<i class="fa-solid fa-comment text-2xl text-black"></i>', border: 'border-[#FEE500]/50' },
            'snapchat': { bg: 'bg-[#FFFC00]', icon: '<i class="fa-brands fa-snapchat text-2xl text-black"></i>', border: 'border-[#FFFC00]/50' },
            'x': { bg: 'bg-black', icon: '<i class="fa-brands fa-x-twitter text-2xl"></i>', border: 'border-gray-800/50' },
            'weibo': { bg: 'bg-[#DF2029]', icon: '<i class="fa-brands fa-weibo text-2xl"></i>', border: 'border-[#DF2029]/50' },
            'tripadvisor': { bg: 'bg-[#34E0A1]', icon: '<i class="fa-solid fa-plane text-2xl"></i>', border: 'border-[#34E0A1]/50' },
            'email': { bg: 'bg-gray-500', icon: '<i class="fa-solid fa-envelope text-2xl"></i>', border: 'border-gray-500/50' },
            'phone': { bg: 'bg-gray-800', icon: '<i class="fa-solid fa-phone text-2xl"></i>', border: 'border-gray-600/50' },
            'web': { bg: 'bg-gray-600', icon: '<i class="fa-solid fa-globe text-2xl"></i>', border: 'border-gray-400/50' },
            'map': { bg: 'bg-red-500', icon: '<i class="fa-solid fa-location-dot text-2xl"></i>', border: 'border-red-500/50' }
        };

        let d = new Date();
        let currentMonthYear = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
        let currentDate = currentMonthYear + "-" + String(d.getDate()).padStart(2, '0'); // 🆕 เพิ่มตัวแปรเก็บวันที่แบบ YYYY-MM-DD

        db.collection('settings').doc('contact_page').get().then(doc => {
            if(doc.exists) {
                let data = doc.data();
                
                if(data.bgImage) document.getElementById('dynamic-bg').style.backgroundImage = `url('${data.bgImage}')`;
                if(data.ogImage) {
                    let ogMeta = document.getElementById('meta-og-img');
                    let twMeta = document.getElementById('meta-tw-img');
                    if(ogMeta) ogMeta.setAttribute('content', data.ogImage);
                    if(twMeta) twMeta.setAttribute('content', data.ogImage);
                }
                
                let allLinks = data.allLinks || []; 
                if(allLinks.length === 0 && data.mainLinks) {
                    ['line', 'wa', 'wechat', 'tg', 'fb'].forEach((k) => {
                        let aKey = k==='wa'?'whatsapp':k==='tg'?'telegram':k==='fb'?'facebook':k;
                        if(data.mainLinks[aKey]) allLinks.push({ type: k, name: aKey.toUpperCase(), url: data.mainLinks[aKey] });
                    });
                    if(data.customLinks) data.customLinks.forEach(c => allLinks.push({ type: 'custom', name: c.name, url: c.url, img: c.img }));
                }

                let mainLinksHtml = ''; let moreLinksHtml = '';

                allLinks.forEach((link, index) => {
                    let typeId = link.iconType || link.type || 'custom'; 
                    let delay = (index % 5) * 100;
                    let cardHtml = '';
                    
                    if (appPresets[typeId] && typeId !== 'custom') {
                        let p = appPresets[typeId];
                        cardHtml = `<button onclick="trackAndGo('${link.name}', '${link.url}')" class="animate-in slide-in-from-bottom-4 fade-in duration-500 fill-mode-both link-card shine-effect w-full ${p.bg} text-white p-3 px-4 rounded-full flex items-center shadow-lg relative overflow-hidden group border ${p.border}" style="animation-delay: ${delay}ms"><div class="bg-white/20 w-12 h-12 rounded-full flex items-center justify-center shrink-0 backdrop-blur-sm z-10">${p.icon}</div><span class="font-bold flex-1 text-center pr-12 text-lg tracking-wide z-10">${link.name}</span></button>`;
                    } else {
                        let imgHtml = link.img ? `<img src="${link.img}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-link text-gray-400 group-hover:text-primary transition-colors text-xl"></i>`;
                        cardHtml = `<button onclick="trackAndGo('${link.name}', '${link.url}')" class="animate-in slide-in-from-bottom-4 fade-in duration-500 fill-mode-both link-card w-full bg-white/80 backdrop-blur-sm text-gray-800 border border-white p-3 px-4 rounded-full flex items-center shadow-sm group hover:border-primary/50 transition-all overflow-hidden relative" style="animation-delay: ${delay}ms"><div class="w-12 h-12 rounded-full bg-white flex items-center justify-center overflow-hidden shrink-0 border border-gray-100 shadow-sm z-10">${imgHtml}</div><span class="font-bold flex-1 text-center pr-12 text-[15px] z-10 group-hover:text-primary transition-colors">${link.name}</span></button>`;
                    }

                    if (index < 5) mainLinksHtml += cardHtml; else moreLinksHtml += cardHtml;
                });

                document.getElementById('links-container').innerHTML = mainLinksHtml;
                
                let moreBtnContainer = document.getElementById('btn-more-toggle');
                let moreChannelsDiv = document.getElementById('more-channels');
                
                if(!moreBtnContainer) {
                    let moreWrapper = document.createElement('div'); moreWrapper.className = 'w-full mt-4';
                    moreWrapper.innerHTML = `<button onclick="toggleMore()" id="btn-more-toggle" class="hidden w-full bg-white/80 backdrop-blur-sm text-primary border-2 border-primary/30 p-4 rounded-full flex items-center justify-center gap-2 font-bold hover:bg-blue-50 hover:border-primary transition-all shadow-sm group"><i class="fa-solid fa-layer-group group-hover:scale-110 transition-transform"></i> <span id="more-text">ช่องทางอื่นๆ (More Channels)</span> <i class="fa-solid fa-chevron-down text-xs transition-transform" id="more-icon"></i></button><div id="more-channels" class="hidden mt-4 space-y-3 animate-in fade-in slide-in-from-top-2"></div>`;
                    document.getElementById('links-container').parentNode.insertBefore(moreWrapper, document.querySelector('footer'));
                    moreBtnContainer = document.getElementById('btn-more-toggle'); moreChannelsDiv = document.getElementById('more-channels');
                }

                if (allLinks.length > 5) { moreBtnContainer.classList.remove('hidden'); moreChannelsDiv.innerHTML = moreLinksHtml; } 
                else { if(moreBtnContainer) moreBtnContainer.classList.add('hidden'); }

                // 🌟 อัปเกรด: บันทึกข้อมูลเข้าหมวดหมู่ รายวัน (Daily) ด้วย
                db.collection('settings').doc('contact_page').set({
                    [`clickStats.Page_Views`]: firebase.firestore.FieldValue.increment(1),
                    [`clickStats.Monthly.${currentMonthYear}.Page_Views`]: firebase.firestore.FieldValue.increment(1),
                    [`clickStats.Daily.${currentDate}.Page_Views`]: firebase.firestore.FieldValue.increment(1) // 🆕 เก็บรายวัน
                }, { merge: true });
            }
        });

        function toggleMore() {
            let moreDiv = document.getElementById('more-channels'); let icon = document.getElementById('more-icon');
            if(moreDiv.classList.contains('hidden')) { moreDiv.classList.remove('hidden'); icon.style.transform = 'rotate(180deg)'; } 
            else { moreDiv.classList.add('hidden'); icon.style.transform = 'rotate(0deg)'; }
        }

        function trackAndGo(channelName, targetUrl) {
            if(!targetUrl) return;
            // 🌟 อัปเกรด: บันทึกการคลิกลิงก์ลงหมวดหมู่ รายวัน (Daily) ด้วย
            db.collection('settings').doc('contact_page').set({
                [`clickStats.${channelName}`]: firebase.firestore.FieldValue.increment(1),
                [`clickStats.Monthly.${currentMonthYear}.${channelName}`]: firebase.firestore.FieldValue.increment(1),
                [`clickStats.Daily.${currentDate}.${channelName}`]: firebase.firestore.FieldValue.increment(1) // 🆕 เก็บรายวัน
            }, { merge: true });
            setTimeout(() => { window.open(targetUrl, '_blank'); }, 150);
        }

// 🌟 ฟังก์ชันควบคุมแสงวิ่งเมื่อเลื่อนจอ (เล่นว้าบเดียว)
let isScrolling;
window.addEventListener('scroll', function (event) {
    // เลือกปุ่มทั้งหมดที่มีคลาส link-card
    const buttons = document.querySelectorAll('.link-card');
    
    // ใส่คลาสกระตุ้นให้แสงวิ่ง
    buttons.forEach(btn => btn.classList.add('scrolling-shine'));

    window.clearTimeout(isScrolling);
    isScrolling = setTimeout(function() {
        // ถอดคลาสออกเมื่อแสงวิ่งจบ (0.7 วิ) เพื่อให้พร้อมแสดงผลรอบใหม่เมื่อมีการเลื่อนจอครั้งถัดไป
        buttons.forEach(btn => btn.classList.remove('scrolling-shine'));
    }, 700); 
}, false);
    </script>
</body>
</html>
