    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1EA7E1', background: '#F3F7FB', text: '#0F172A', groupPrimary: '#000080' }, fontFamily: { heading: ['Poppins', 'Noto Sans Thai', 'sans-serif'], body: ['Noto Sans Thai', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #F3F7FB; }
        * { -webkit-tap-highlight-color: transparent; }
        .link-card { transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2); will-change: transform, box-shadow; position: relative; overflow: hidden; }
        @media (hover: hover) { .link-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 20px 30px -5px rgba(0,0,0,0.15), inset 0 0 15px rgba(255,255,255,0.4); } }
        .link-card:active { transform: scale(0.92) translateY(2px) !important; box-shadow: 0 5px 10px -5px rgba(0,0,0,0.1) !important; filter: brightness(0.95); }
        @keyframes premium-shine { 0% { left: -100%; opacity: 0; } 15% { opacity: 1; } 60% { left: 100%; opacity: 1; } 100% { left: 100%; opacity: 0; } }
        .link-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); z-index: 20; pointer-events: none; }
        .link-card:hover::before, .link-card:active::before { animation: premium-shine 1.5s ease-in-out infinite; }
        .link-card i { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 2; }
        .link-card:hover i, .link-card:active i { transform: scale(1.25) rotate(8deg); }
        .link-card span { position: relative; z-index: 2; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-6 font-body relative overflow-x-hidden">

    <div id="dynamic-bg" class="fixed inset-0 z-0 opacity-40 bg-[url('hero-bg.jpg')] bg-cover bg-center bg-no-repeat pointer-events-none transition-all duration-1000"></div>
    <div class="fixed inset-0 z-0 bg-gradient-to-b from-white/60 to-[#F3F7FB] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md flex flex-col items-center">
        <div class="w-full text-center mb-10 animate-in slide-in-from-top-4 duration-500">
            <div class="w-28 h-28 mx-auto bg-white rounded-full p-2 shadow-[0_0_20px_rgba(30,167,225,0.2)] mb-4 border-2 border-primary/20 relative">
                <img src="logo-cleanforce.png" alt="Cleanforce" class="w-full h-full object-contain rounded-full" onerror="this.src='https://placehold.co/100x100?text=CF'">
                <div class="absolute bottom-1 right-1 w-6 h-6 bg-green-500 border-2 border-white rounded-full animate-pulse"></div>
            </div>
            <h1 class="text-3xl font-bold text-[#000080] font-heading">Cleanforce</h1>
            <p class="text-sm text-gray-500 mt-1 font-medium bg-white/60 inline-block px-4 py-1 rounded-full shadow-sm border border-white">บริการทำความสะอาดพรีเมียม</p>
        </div>

        <div id="links-container" class="w-full space-y-4 mb-8">
            <div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>กำลังโหลดช่องทางการติดต่อ...</div>
        </div>

        <footer class="mt-16 pt-8 text-center w-full border-t border-gray-200/50">
            <a href="cleanforce.html" class="inline-flex items-center gap-2 bg-white text-gray-600 px-6 py-3 rounded-full shadow-sm hover:text-primary hover:shadow-md transition font-bold text-sm mb-4 border border-gray-100">
                <i class="fa-solid fa-house"></i> ไปที่เว็ป Cleanforce
            </a>
            <p class="text-gray-400 text-[10px] font-medium">© 2026 Cleanforce. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // สีและไอคอนมาตรฐาน
        const presets = {
            line: { bg: 'bg-[#00B900]', icon: '<i class="fa-brands fa-line text-3xl"></i>', border: 'border-[#00B900]/50' },
            wa: { bg: 'bg-[#25D366]', icon: '<i class="fa-brands fa-whatsapp text-3xl"></i>', border: 'border-[#25D366]/50' },
            wechat: { bg: 'bg-[#07C160]', icon: '<i class="fa-brands fa-weixin text-3xl"></i>', border: 'border-[#07C160]/50' },
            tg: { bg: 'bg-[#0088cc]', icon: '<i class="fa-brands fa-telegram text-3xl"></i>', border: 'border-[#0088cc]/50' },
            fb: { bg: 'bg-[#1877F2]', icon: '<i class="fa-brands fa-facebook text-3xl"></i>', border: 'border-[#1877F2]/50' }
        };

        let d = new Date();
        let currentMonthYear = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');

        db.collection('settings').doc('contact_page').get().then(doc => {
            if(doc.exists) {
                let data = doc.data();
                
                // เปลี่ยนพื้นหลัง
                if(data.bgImage) {
                    document.getElementById('dynamic-bg').style.backgroundImage = `url('${data.bgImage}')`;
                }
                
                // เปลี่ยนรูปพรีวิว (Link Preview)
                if(data.ogImage) {
                    let ogMeta = document.getElementById('meta-og-img');
                    let twMeta = document.getElementById('meta-tw-img');
                    if(ogMeta) ogMeta.setAttribute('content', data.ogImage);
                    if(twMeta) twMeta.setAttribute('content', data.ogImage);
                }
                
                // แสดงผลลิงก์
                let linksHtml = '';
                let allLinks = data.allLinks || []; // ใช้ระบบโครงสร้างข้อมูลใหม่

                // กรณีข้อมูลเก่า ยังไม่โดนอัปเกรด
                if(allLinks.length === 0 && data.mainLinks) {
                    ['line', 'wa', 'wechat', 'tg', 'fb'].forEach((k) => {
                        let aKey = k==='wa'?'whatsapp':k==='tg'?'telegram':k==='fb'?'facebook':k;
                        if(data.mainLinks[aKey]) allLinks.push({ type: k, name: aKey.toUpperCase(), url: data.mainLinks[aKey] });
                    });
                    if(data.customLinks) {
                        data.customLinks.forEach(c => allLinks.push({ type: 'custom', name: c.name, url: c.url, img: c.img }));
                    }
                }

                allLinks.forEach((link, index) => {
                    let typeId = link.type || 'custom';
                    let delay = index * 100; // Animation delay
                    
                    if (presets[typeId]) {
                        // รูปแบบปุ่มหลัก (Main App)
                        let p = presets[typeId];
                        linksHtml += `
                        <button onclick="trackAndGo('${link.name}', '${link.url}')" class="animate-in slide-in-from-bottom-4 fade-in duration-500 fill-mode-both link-card w-full ${p.bg} text-white p-3 px-4 rounded-full flex items-center shadow-lg relative overflow-hidden group border ${p.border}" style="animation-delay: ${delay}ms">
                            <div class="bg-white/20 w-12 h-12 rounded-full flex items-center justify-center shrink-0 backdrop-blur-sm z-10">${p.icon}</div>
                            <span class="font-bold flex-1 text-center pr-12 text-lg tracking-wide z-10">${link.name}</span>
                        </button>`;
                    } else {
                        // รูปแบบช่องทางเสริม (Custom)
                        let imgHtml = link.img ? `<img src="${link.img}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-link text-gray-400 group-hover:text-primary transition-colors"></i>`;
                        linksHtml += `
                        <button onclick="trackAndGo('${link.name}', '${link.url}')" class="animate-in slide-in-from-bottom-4 fade-in duration-500 fill-mode-both link-card w-full bg-white/80 backdrop-blur-sm text-gray-800 border border-white p-3 px-4 rounded-full flex items-center shadow-sm group hover:border-primary/50 transition-all overflow-hidden relative" style="animation-delay: ${delay}ms">
                            <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center overflow-hidden shrink-0 border border-gray-100 shadow-sm z-10">${imgHtml}</div>
                            <span class="font-bold flex-1 text-center pr-12 text-[15px] z-10 group-hover:text-primary transition-colors">${link.name}</span>
                        </button>`;
                    }
                });

                document.getElementById('links-container').innerHTML = linksHtml;
                
                // บันทึกสถิติรายเดือน
                db.collection('settings').doc('contact_page').set({
                    [`clickStats.Page_Views`]: firebase.firestore.FieldValue.increment(1),
                    [`clickStats.Monthly.${currentMonthYear}.Page_Views`]: firebase.firestore.FieldValue.increment(1)
                }, { merge: true });
            }
        });

        function trackAndGo(channelName, targetUrl) {
            if(!targetUrl) return;
            // บันทึกคลิกรายช่องทาง ทั้งยอดรวม และยอดรายเดือน
            db.collection('settings').doc('contact_page').set({
                [`clickStats.${channelName}`]: firebase.firestore.FieldValue.increment(1),
                [`clickStats.Monthly.${currentMonthYear}.${channelName}`]: firebase.firestore.FieldValue.increment(1)
            }, { merge: true });

            setTimeout(() => { window.open(targetUrl, '_blank'); }, 150);
        }
    </script>
</body>
</html>
