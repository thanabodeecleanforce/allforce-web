<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ของฉัน | Cleanforce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans Thai', sans-serif; background-color: #F3F7FB; }</style>
</head>
<body class="text-gray-800 pb-24">

    <header class="bg-white border-b border-gray-100 p-4 sticky top-0 z-40 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="cleanforce.html" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-500 hover:text-primary transition"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 class="font-bold text-[#000080] text-lg font-['Poppins']">My Profile</h1>
        </div>
        <button onclick="logout()" class="text-red-500 text-sm font-bold bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 transition"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</button>
    </header>

    <div class="mt-6 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-ticket text-primary"></i> คูปองของฉัน
            </h2>
            <div id="my-coupons-list" class="space-y-3">
                <p class="text-sm text-gray-400 text-center py-4">กำลังโหลดข้อมูลคูปอง...</p>
            </div>
        </div>

    <main class="max-w-3xl mx-auto p-4 md:p-6 mt-4 space-y-6">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center gap-6">
            <img id="prof-img" src="https://placehold.co/100" class="w-20 h-20 rounded-full border-2 border-gray-100 shadow-sm">
            <div>
                <h2 id="prof-name" class="text-xl font-bold text-gray-800">กำลังโหลด...</h2>
                <p id="prof-email" class="text-sm text-gray-500">-</p>
            </div>
        </div>
        <div id="pkg-container" class="hidden bg-gradient-to-r from-yellow-50 to-white rounded-2xl shadow-sm border border-yellow-200 overflow-hidden">
            <div class="p-4 border-b border-yellow-100 bg-yellow-100/50">
                <h3 class="font-bold text-yellow-800 flex items-center gap-2"><i class="fa-solid fa-crown"></i> แพ็กเกจและโควตาส่วนตัว</h3>
            </div>
            <div id="my-packages" class="p-5 grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50">
                <h3 class="font-bold text-[#000080] flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> ประวัติการจองบริการ</h3>
            </div>
            <div id="my-bookings" class="p-4 space-y-4">
                <p class="text-center text-gray-400 py-8"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>กำลังดึงข้อมูล...</p>
            </div>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                // โชว์รูปและชื่อ
                document.getElementById('prof-img').src = user.photoURL;
                document.getElementById('prof-name').textContent = user.displayName;
                document.getElementById('prof-email').textContent = user.email;

                // 🌟 ดึงข้อมูลแพ็กเกจ VIP ของตัวเอง
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if(doc.exists && doc.data().customPackages && doc.data().customPackages.length > 0) {
                        let pkgs = doc.data().customPackages;
                        let hasActive = false;
                        let html = '';
                        
                        pkgs.forEach(pkg => {
                            if(pkg.remain > 0) {
                                hasActive = true;
                                let expText = pkg.expireDate ? new Date(pkg.expireDate).toLocaleDateString('th-TH') : 'ไม่มีกำหนด';
                                html += `
                                <div class="bg-white border-2 border-yellow-300 p-4 rounded-xl relative">
                                    <div class="absolute right-0 top-0 bg-yellow-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg">เหลือ ${pkg.remain} สิทธิ์</div>
                                    <h4 class="font-bold text-[#000080] text-sm mb-1 w-3/4 truncate">${pkg.name}</h4>
                                    <p class="text-[10px] text-gray-500 mb-2 line-clamp-2">${pkg.desc || '-'}</p>
                                    <div class="flex items-center gap-2 text-[10px] font-bold text-gray-600 bg-gray-50 p-2 rounded border border-gray-100">
                                        <i class="fa-regular fa-calendar-xmark"></i> หมดอายุ: ${expText}
                                    </div>
                                    <a href="cleanforce.html" class="mt-3 block text-center bg-yellow-50 text-yellow-700 border border-yellow-400 px-4 py-2 rounded-lg text-xs font-bold hover:bg-yellow-500 hover:text-white transition w-full shadow-sm">ไปหน้าจองคิวเพื่อใช้สิทธิ์</a>
                                </div>`;
                            }
                        });
                        
                        if(hasActive) {
                            document.getElementById('pkg-container').classList.remove('hidden');
                            document.getElementById('my-packages').innerHTML = html;
                        } else {
                            document.getElementById('pkg-container').classList.add('hidden');
                        }
                    }
                });
                
                // ดึงประวัติการจองของตัวเอง (ตัด orderBy ออกเพื่อแก้ปัญหา Index Error และดึงข้อมูลใหม่)
                db.collection("bookings")
                  .where("userId", "==", user.uid)
                  .onSnapshot(snapshot => {
                      let html = '';
                      if(snapshot.empty) {
                          html = '<div class="text-center text-gray-400 py-8 border-2 border-dashed border-gray-200 rounded-xl"><i class="fa-solid fa-box-open text-3xl mb-2"></i><br>คุณยังไม่มีประวัติการจอง</div>';
                      } else {
                          let bookings = [];
                          snapshot.forEach(doc => bookings.push({id: doc.id, ...doc.data()}));
                          
                          // เรียงลำดับจากใหม่ไปเก่าด้วย JavaScript แทน เพื่อไม่ให้ Database Error
                          bookings.sort((a, b) => {
                              let timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                              let timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                              return timeB - timeA;
                          });

                          bookings.forEach(b => {
                              // รองรับตัวแปรทั้งระบบเก่าและใหม่
                              let bDate = b.bookingDate || b.date || '-';
                              let bTime = b.bookingTime || b.time || '-';
                              let bCategory = b.serviceMode || b.category || '-';
                              let bPrice = b.totalPrice || b.netPrice || 0;
                              let bStatus = b.status || 'รอยืนยัน';

                              let statusColor = bStatus === 'รอยืนยัน' ? 'bg-yellow-100 text-yellow-700' : (bStatus === 'สำเร็จ' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700');
                              
                              // จัดการบริการเสริมให้อ่านง่าย
                              let addonsHtml = '';
                              if (b.addons && typeof b.addons === 'string') {
                                  addonsHtml = `<div class="text-xs text-gray-500 mt-2">${b.addons.replace(/\n/g, '<br>')}</div>`;
                              } else if (b.addonsList) {
                                  addonsHtml = b.addonsList.map(a => `<p class="text-xs text-gray-500">- ${a.name} ${a.size} <span class="text-gray-400">(x${a.qty})</span></p>`).join('');
                              }

                              html += `
                              <div class="border border-gray-100 rounded-xl p-4 hover:shadow-md transition bg-white">
                                  <div class="flex justify-between items-start mb-3 border-b border-gray-50 pb-3">
                                      <div>
                                          <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">รหัสอ้างอิง: ${b.refId || b.id.slice(0,6).toUpperCase()}</p>
                                          <p class="font-bold text-gray-800 text-sm mt-1"><i class="fa-solid fa-calendar-day text-primary mr-1"></i> ${bDate} | ${bTime} น.</p>
                                      </div>
                                      <span class="text-[10px] font-bold px-2 py-1 rounded-full ${statusColor}">${bStatus}</span>
                                  </div>
                                  <div class="mb-3">
                                      <p class="text-xs font-bold text-[#000080] mb-1">บริการ: ${bCategory}</p>
                                      <p class="text-xs font-bold text-gray-600 mb-1">${b.baseService || ''}</p>
                                      ${addonsHtml}
                                  </div>
                                  <div class="flex justify-between items-end pt-2 border-t border-gray-50">
                                      <p class="text-[10px] text-gray-400">จองเมื่อ: ${b.createdAt ? b.createdAt.toDate().toLocaleDateString('th-TH') : 'เพิ่งทำรายการ'}</p>
                                      <p class="font-bold text-primary text-lg">${bPrice.toLocaleString()} ฿</p>
                                  </div>
                              </div>`;
                          });
                      }
                      document.getElementById('my-bookings').innerHTML = html;
                  }, error => {
                      console.error("Error fetching bookings:", error);
                      document.getElementById('my-bookings').innerHTML = '<div class="text-center text-red-500 py-8"><i class="fa-solid fa-circle-exclamation text-3xl mb-2"></i><br>เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
                  });
            } else {
                window.location.href = "login.html"; // ถ้าไม่ได้ล็อกอิน เตะกลับไปหน้าล็อกอิน
            }
        });

        function logout() {
            auth.signOut().then(() => {
                localStorage.removeItem('cf_user');
                window.location.href = "cleanforce.html";
            });
        }
        // 🌟 ฟังก์ชันดึงคูปองมาแสดงผล ดีไซน์ใหม่ โชว์ครบ!
        async function loadMyCoupons() {
            let myCoupons = JSON.parse(localStorage.getItem('my_coupons') || '[]');
            let container = document.getElementById('my-coupons-list');
            
            if (myCoupons.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-6"><i class="fa-solid fa-box-open text-3xl mb-2 text-gray-300"></i><br><span class="text-sm">คุณยังไม่มีคูปองที่เก็บไว้</span></div>';
                return;
            }

            try {
                // ดึงเฉพาะคูปองที่แอดมินเปิดใช้งาน
                const snapshot = await db.collection('coupons').where('isActive', '==', true).get();
                let html = '';
                let hasValidCoupon = false;

                snapshot.forEach(doc => {
                    let c = doc.data();
                    if (myCoupons.includes(c.code)) {
                        hasValidCoupon = true;
                        // 🔧 BUG FIX: endDate ถูกบันทึกเป็น string (YYYY-MM-DD) ไม่ใช่ Timestamp
                        let expiryStr = c.endDate
                            ? new Date(c.endDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' })
                            : 'ไม่มีกำหนด';

                        html += `
                        <div class="border border-primary border-dashed bg-blue-50 rounded-lg p-3 flex justify-between items-center gap-3 relative overflow-hidden">
                            <div class="absolute -left-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full border-r-2 border-dashed border-primary"></div>
                            <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full border-l-2 border-dashed border-primary"></div>
                            
                            <div class="flex-1">
                                <span class="bg-primary text-white text-[10px] px-2 py-0.5 rounded-full font-bold inline-block mb-1">พร้อมใช้</span>
                                <p class="font-bold text-gray-800 text-xl tracking-wider">${c.code}</p>
                                <p class="text-sm font-bold text-gray-700">${c.discountType === 'percent' ? 'ลด '+c.discountValue+'%' : 'ลด '+c.discountValue+' บาท'}</p>
                                <p class="text-[10px] text-gray-500 mt-1">จองขั้นต่ำ: ${c.minSpend || '0'} บาท | หมดอายุ: ${expiryStr}</p>
                            </div>
                            <button onclick="copyCoupon('${c.code}')" class="text-primary flex flex-col items-center flex-shrink-0 hover:scale-110 transition">
                                <i class="fa-regular fa-copy text-xl"></i>
                                <span class="text-[10px] font-bold mt-1">คัดลอกโค้ด</span>
                            </button>
                        </div>`;
                    }
                });

                if (!hasValidCoupon) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-4 text-sm">คูปองที่คุณเก็บไว้หมดอายุแล้ว หรือถูกปิดการใช้งาน</div>';
                } else {
                    container.innerHTML = html;
                }
            } catch(e) {
                console.error(e);
                container.innerHTML = '<p class="text-sm text-red-500 text-center">โหลดข้อมูลคูปองไม่สำเร็จ</p>';
            }
        }

        // 🌟 ฟังก์ชันคัดลอกโค้ด
        window.copyCoupon = function(code) {
            navigator.clipboard.writeText(code);
            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'คัดลอกโค้ดสำเร็จ! นำไปวางตอนจองได้เลย', showConfirmButton: false, timer: 2000 });
        }
    </script>
</body>
</html>
