<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile & Coupons | Cleanforce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        groupPrimary: '#000080',    
                        cleanforce: '#00B4D8',      
                    },
                    fontFamily: {
                        heading: ['Poppins', 'Noto Sans Thai', 'sans-serif'],
                        body: ['Noto Sans Thai', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
        .font-heading { font-family: 'Poppins', 'Noto Sans Thai', sans-serif; }
        
        .coupon-card {
            background: #fff;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-left: 6px dashed #00B4D8;
        }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-groupPrimary hover:text-cleanforce transition font-bold">
                <i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก
            </a>
            <div class="font-heading font-bold text-xl text-groupPrimary">My Profile</div>
            <button id="logout-btn" class="text-red-500 hover:text-red-700 font-bold transition flex items-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">ออกจากระบบ</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
        
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-6 mb-10">
            <img id="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile" class="w-20 h-20 rounded-full border-4 border-cleanforce/20 object-cover">
            <div>
                <h1 id="profile-name" class="text-2xl font-bold font-heading text-groupPrimary mb-1">กำลังโหลด...</h1>
                <p id="profile-email" class="text-gray-500 text-sm">กำลังโหลด...</p>
            </div>
        </div>

        <div class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-xl font-bold font-heading text-groupPrimary flex items-center gap-2">
                    <i class="fa-solid fa-ticket text-cleanforce"></i> คูปองของฉัน
                </h2>
                <p class="text-gray-500 text-sm mt-1">คูปองส่วนลดที่คุณเก็บไว้ สามารถนำไปใช้ตอนจองบริการได้เลย</p>
            </div>
            <div class="text-sm font-bold text-gray-400">
                รวม: <span id="coupon-count" class="text-cleanforce text-lg">0</span> รายการ
            </div>
        </div>

        <div id="coupons-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="loading-state" class="col-span-full text-center py-12 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-cleanforce"></i>
                <p>กำลังดึงข้อมูลคูปองของคุณ...</p>
            </div>
            
            <div id="empty-state" class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100 hidden">
                <i class="fa-regular fa-face-frown-open text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-lg font-bold text-gray-600 mb-2">คุณยังไม่มีคูปอง</h3>
                <p class="text-gray-400 text-sm mb-6">ลองกลับไปหน้าหลักเพื่อดูโปรโมชั่นและเก็บคูปองส่วนลดดูสิ!</p>
                <a href="index.html" class="bg-cleanforce text-white px-6 py-2 rounded-full font-bold hover:bg-opacity-90 transition shadow-md">ไปเก็บคูปอง</a>
            </div>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. Firebase Config (มีจุดเดียวพอ)
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. เช็คการล็อกอินผ่าน Firebase Auth (แบบ Real-time)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // อัปเดตข้อมูลขึ้นหน้าจอ
                document.getElementById('profile-name').textContent = user.displayName;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('profile-img').src = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                
                // ดึงคูปองจาก Firestore โดยใช้ uid ของ user ปัจจุบัน
                fetchMyCoupons(user.uid);
            } else {
                // ถ้าไม่ได้ล็อกอิน เด้งไปหน้า login
                alert('กรุณาเข้าสู่ระบบเพื่อดูคูปองของคุณ');
                window.location.href = 'login.html';
            }
        });

        // 3. ฟังก์ชันดึงข้อมูลจาก Firestore
        async function fetchMyCoupons(uid) {
            const container = document.getElementById('coupons-container');
            const loading = document.getElementById('loading-state');
            const empty = document.getElementById('empty-state');
            const countDisplay = document.getElementById('coupon-count');

            try {
                // หมายเหตุ: ถ้าเจอ Error "requires an index" ใน Console ให้เอา .orderBy() ออกก่อน หรือไปสร้าง Index ใน Firebase Console
                const snapshot = await db.collection('users').doc(uid).collection('coupons')
                                         .orderBy('collectedAt', 'desc').get();
                
                loading.classList.add('hidden'); 

                if (snapshot.empty) {
                    empty.classList.remove('hidden'); 
                    return;
                }

                countDisplay.textContent = snapshot.size;

                snapshot.forEach(doc => {
                    const coupon = doc.data();
                    let dateText = "ไม่มีวันหมดอายุ";
                    if(coupon.collectedAt) {
                         const date = coupon.collectedAt.toDate();
                         dateText = `เก็บเมื่อ: ${date.toLocaleDateString('th-TH')}`;
                    }

                    const couponHTML = `
                        <div class="coupon-card p-5 flex items-center justify-between hover:-translate-y-1 transition duration-300">
                            <div class="flex-1 pr-4">
                                <span class="bg-cleanforce/10 text-cleanforce text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider mb-2 inline-block">
                                    ${coupon.status === 'active' ? 'พร้อมใช้งาน' : 'ใช้แล้ว'}
                                </span>
                                <h3 class="text-lg font-bold text-gray-800 font-heading leading-tight mb-1">${coupon.title || 'คูปองส่วนลด'}</h3>
                                <p class="text-xs text-gray-500 mb-3">${dateText}</p>
                                
                                <div class="bg-gray-100 inline-block px-3 py-1.5 rounded border border-gray-200 border-dashed">
                                    <span class="text-xs text-gray-500 mr-1">CODE:</span>
                                    <span class="font-bold text-groupPrimary font-mono tracking-widest">${coupon.code}</span>
                                </div>
                            </div>
                            
                            <div class="flex flex-col items-center justify-center border-l border-gray-100 pl-4 min-w-[90px]">
                                <span class="text-3xl font-bold text-buildforce font-heading">${coupon.discount || '0'}</span>
                                <span class="text-xs text-gray-400 font-bold">THB</span>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', couponHTML);
                });

            } catch (error) {
                console.error("Error fetching coupons: ", error);
                // ดักจับ Error กรณีที่ยังไม่ได้สร้าง Index
                if (error.message.includes("requires an index")) {
                    console.warn("ข้ามการจัดเรียงวันที่ เนื่องจากยังไม่ได้สร้าง Firestore Index");
                    // โหลดใหม่แบบไม่เรียงลำดับ
                    fetchMyCouponsWithoutOrder(uid);
                } else {
                    loading.innerHTML = `<p class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> เกิดข้อผิดพลาดในการดึงข้อมูล โปรดรีเฟรชหน้าเว็บ</p>`;
                }
            }
        }
        
        // ฟังก์ชันสำรองกรณียังไม่ได้สร้าง Index
        async function fetchMyCouponsWithoutOrder(uid) {
             const container = document.getElementById('coupons-container');
             const empty = document.getElementById('empty-state');
             const countDisplay = document.getElementById('coupon-count');
             
             const snapshot = await db.collection('users').doc(uid).collection('coupons').get();
             if (snapshot.empty) {
                 empty.classList.remove('hidden'); 
                 return;
             }
             countDisplay.textContent = snapshot.size;
             // ... (ลอจิกสร้างการ์ดคูปองเหมือนเดิม แต่ข้ามส่วนนี้ไปเพื่อความกระชับ โค้ดด้านบนจะเรียกใช้ให้เองถ้ายกเลิก orderBy)
        }

        // 4. สคริปต์ปุ่มออกจากระบบ
        document.getElementById('logout-btn').onclick = function() {
            if(confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                auth.signOut().then(() => {
                    localStorage.removeItem('cf_user');
                    window.location.href = 'index.html'; 
                });
            }
        };
    </script>
</body>
</html>
