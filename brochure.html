<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleanforce Brochure 3D</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #eef2f5;
    font-family: sans-serif;
    overflow: hidden;
    perspective: 3000px; 
    /* ป้องกันการเด้งซูมของเบราว์เซอร์เวลาใช้สองนิ้ว */
    touch-action: none;
  }

  .instruction {
    position: absolute;
    top: 30px;
    font-size: 20px;
    color: #fff;
    font-weight: bold;
    background: linear-gradient(135deg, #007bff, #0056b3);
    padding: 12px 30px;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(0,123,255,0.4);
    cursor: pointer;
    z-index: 100;
    transition: transform 0.3s, box-shadow 0.3s;
    user-select: none;
  }

  .instruction:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,123,255,0.6);
  }

  .hint {
    position: absolute;
    bottom: 30px;
    font-size: 14px;
    color: #666;
    background: rgba(255,255,255,0.8);
    padding: 8px 20px;
    border-radius: 20px;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
  }

  .scene-wrapper {
    /* ตั้งค่าเริ่มต้นสำหรับ Scale และ Zoom */
    --scale-factor: 1;
    --zoom: 1;
    transform-style: preserve-3d;
    cursor: grab;
    transition: transform 0.1s linear; 
  }

  .scene-wrapper:active {
    cursor: grabbing;
  }

  /* 🛠️ แก้ไขให้ Responsive ทำงานได้จริงเมื่อเปิดบนมือถือ */
  @media (max-width: 1200px) { .scene-wrapper { --scale-factor: 0.8; } }
  @media (max-width: 900px) { .scene-wrapper { --scale-factor: 0.6; } }
  @media (max-width: 600px) { .scene-wrapper { --scale-factor: 0.45; } }
  @media (max-width: 450px) { .scene-wrapper { --scale-factor: 0.35; } }
  @media (max-width: 380px) { .scene-wrapper { --scale-factor: 0.3; } }

  .panel {
    position: absolute;
    width: 300px;
    height: 636px;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .center-panel {
    position: relative;
    z-index: 1;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  }

  .left-panel {
    top: 0;
    left: -300px;
    transform-origin: right center;
  }

  .right-panel {
    top: 0;
    left: 300px;
    transform-origin: left center;
  }

  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    background-color: #fff;
    border: 1px solid rgba(0,0,0,0.05); 
    box-sizing: border-box;
  }

  .face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none; 
  }

  .face::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, rgba(255,255,255,0) 10%, rgba(255,255,255,0) 90%, rgba(0,0,0,0.05) 100%);
    pointer-events: none;
  }

  .front { transform: translateZ(0.5px); }
  .back { transform: rotateY(180deg) translateZ(0.5px); }

</style>
</head>
<body>

  <div class="instruction" id="instruction" onclick="forceNextState()">กำลังเตรียมแผ่นพับ...</div>
  
  <div class="scene-wrapper" id="sceneWrapper">
    <div class="panel center-panel" id="centerPanel">
      <div class="face front"><img src="หน้ากลางด้านใน.png" alt="หน้ากลางด้านใน"></div>
      <div class="face back"><img src="หน้ากลางด้านหลัง.png" alt="หน้ากลางด้านหลัง"></div>

      <div class="panel left-panel" id="leftPanel">
        <div class="face front"><img src="หลังหน้าปก.png" alt="หลังหน้าปก"></div>
        <div class="face back"><img src="หน้าปก.png" alt="หน้าปก"></div>
      </div>

      <div class="panel right-panel" id="rightPanel">
        <div class="face front"><img src="หน้าหลังด้านใน.png" alt="หน้าหลังด้านใน"></div>
        <div class="face back"><img src="หน้าสุดท้ายด้านหลัง.png" alt="หน้าสุดท้ายด้านหลัง"></div>
      </div>
    </div>
  </div>

  <div class="hint">🖱️ คลิกค้างเพื่อหมุน 3D | 👆 คลิกเพื่อกาง/พับกระดาษ <br> 🔍 ถ่างนิ้ว หรือ เลื่อนลูกกลิ้งเมาส์ เพื่อซูมย่อ-ขยาย</div>

  <script>
    let state = 0; 
    let isDragging = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;
    let dragDistance = 0;
    
    // ตัวแปรสำหรับระบบซูม
    let zoomLevel = 1;
    let initialPinchDist = null;

    const sceneWrapper = document.getElementById('sceneWrapper');

    function init() {
      const leftPanel = document.getElementById('leftPanel');
      const rightPanel = document.getElementById('rightPanel');
      const instruction = document.getElementById('instruction');

      leftPanel.style.transition = "none";
      rightPanel.style.transition = "none";
      leftPanel.style.transform = "translateZ(4px) rotateY(0deg)";
      rightPanel.style.transform = "translateZ(2px) rotateY(0deg)";
      
      currentX = 15; 
      currentY = -20; 
      applyRotation();

      setTimeout(() => {
        leftPanel.style.transition = "";
        rightPanel.style.transition = "";
        
        rightPanel.style.transform = "translateZ(2px) rotateY(-180deg)";
        
        setTimeout(() => {
          leftPanel.style.transform = "translateZ(4px) rotateY(180deg)";
          instruction.innerText = "คลิกเพื่อเปิดหน้าปก";
        }, 650);

      }, 500);
      
      state = 0; 
    }

    function nextState() {
      const leftPanel = document.getElementById('leftPanel');
      const rightPanel = document.getElementById('rightPanel');
      const instruction = document.getElementById('instruction');

      if (instruction.innerText === "กำลังเตรียมแผ่นพับ...") return;

      if (state === 0) {
        leftPanel.style.transform = "translateZ(4px) rotateY(0deg)";
        instruction.innerText = "คลิกเพื่อกางเต็มแผ่น (A4)";
        state = 1;
      } else if (state === 1) {
        rightPanel.style.transform = "translateZ(2px) rotateY(0deg)";
        instruction.innerText = "คลิกเพื่อพับเก็บ";
        state = 2;
      } else if (state === 2) {
        rightPanel.style.transform = "translateZ(2px) rotateY(-180deg)";
        instruction.innerText = "คลิกเพื่อเปิดหน้าปก";
        
        setTimeout(() => {
          leftPanel.style.transform = "translateZ(4px) rotateY(180deg)";
        }, 650);
        state = 0;
      }
    }

    function forceNextState() {
      nextState();
    }

    function applyRotation() {
      currentX = Math.max(-60, Math.min(60, currentX));
      // ใช้สูตรคำนวณ Scale หลักของหน้าจอ ผสมกับ Zoom Level ที่ผู้ใช้ซูมเอง
      sceneWrapper.style.transform = `scale(calc(var(--scale-factor) * ${zoomLevel})) rotateX(${currentX}deg) rotateY(${currentY}deg)`;
    }

    // --- Events ควบคุมการหมุนด้วยเมาส์ ---
    sceneWrapper.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragDistance = 0;
      startX = e.pageX;
      startY = e.pageY;
      sceneWrapper.style.transition = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.pageX - startX;
      const dy = e.pageY - startY;
      dragDistance += Math.abs(dx) + Math.abs(dy);
      
      currentY += dx * 0.4;
      currentX -= dy * 0.4;
      
      applyRotation();
      
      startX = e.pageX;
      startY = e.pageY;
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      sceneWrapper.style.transition = 'transform 0.3s ease-out';
      
      if (dragDistance < 10) {
        nextState();
      }
    });

    // --- ระบบซูมด้วยลูกกลิ้งเมาส์ (Scroll Wheel) ---
    document.addEventListener('wheel', (e) => {
      zoomLevel += e.deltaY * -0.001; // ปรับความเร็วการซูม
      zoomLevel = Math.min(Math.max(0.4, zoomLevel), 2.5); // ล็อกการซูมไว้ที่ไม่เกิน 2.5 เท่า และไม่เล็กกว่า 0.4 เท่า
      applyRotation();
    }, {passive: false});


    // --- Events ควบคุมทัชสกรีน และ ซูมด้วยนิ้ว (Pinch to Zoom) ---
    sceneWrapper.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        // ถ้าแตะ 2 นิ้ว ให้เตรียมซูม
        isDragging = false;
        const dx = e.touches[0].pageX - e.touches[1].pageX;
        const dy = e.touches[0].pageY - e.touches[1].pageY;
        initialPinchDist = Math.sqrt(dx*dx + dy*dy);
      } else if (e.touches.length === 1) {
        // ถ้าแตะนิ้วเดียว ให้หมุนเหมือนเดิม
        isDragging = true;
        dragDistance = 0;
        startX = e.touches[0].pageX;
        startY = e.touches[0].pageY;
        sceneWrapper.style.transition = 'none';
      }
    });

    document.addEventListener('touchmove', (e) => {
      // ทำงานเมื่อผู้ใช้ถ่าง 2 นิ้ว
      if (e.touches.length === 2 && initialPinchDist !== null) {
        e.preventDefault();
        const dx = e.touches[0].pageX - e.touches[1].pageX;
        const dy = e.touches[0].pageY - e.touches[1].pageY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        // คำนวณสัดส่วนการถ่างนิ้ว
        const scaleChange = dist / initialPinchDist;
        zoomLevel *= scaleChange;
        zoomLevel = Math.min(Math.max(0.4, zoomLevel), 2.5); // ลิมิตขอบเขตการซูม
        
        applyRotation();
        initialPinchDist = dist; // อัปเดตระยะนิ้วตลอดเวลาที่ลาก
        return;
      }

      // ทำงานเมื่อใช้นิ้วเดียวลากหมุน
      if (!isDragging || e.touches.length !== 1) return;
      e.preventDefault();
      const dx = e.touches[0].pageX - startX;
      const dy = e.touches[0].pageY - startY;
      dragDistance += Math.abs(dx) + Math.abs(dy);
      
      currentY += dx * 0.5;
      currentX -= dy * 0.5;
      
      applyRotation();
      
      startX = e.touches[0].pageX;
      startY = e.touches[0].pageY;
    }, {passive: false});

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        initialPinchDist = null; // ถ้ายกนิ้วออก ให้ยกเลิกระบบซูม 2 นิ้ว
      }
      if (!isDragging) return;
      isDragging = false;
      sceneWrapper.style.transition = 'transform 0.3s ease-out';
      
      // ถ้าแตะนิ้วเดียวแล้วปล่อยเฉยๆ ให้ถือเป็นการคลิกพับ/กาง
      if (dragDistance < 10) {
        nextState();
      }
    });

    window.onload = init;
  </script>
</body>
</html>
