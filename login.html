<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Cleanforce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        
        /* 🌟 ปรับปรุงส่วนนี้: เพิ่มความเข้มเงา และเส้นขอบให้ชัดเจนขึ้น */
        .glass-card { 
            background: rgba(255, 255, 255, 0.98); /* เพิ่มความทึบแสงเล็กน้อยให้ตัดกับพื้นหลัง */
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            
            /* เส้นขอบสีฟ้าอ่อนที่ชัดเจนขึ้น */
            border: 2px solid rgba(30, 167, 225, 0.1); 
            
            /* 🌟 เอฟเฟกต์เงาลึก (Deep Shadow) ทำให้กล่องลอยเด่น */
            box-shadow: 0 35px 70px -15px rgba(0, 0, 80, 0.2), 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* เอฟเฟกต์เมื่อ Hover (สำหรับ Desktop) */
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 45px 80px -20px rgba(0, 0, 80, 0.25), 0 15px 35px -10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center overflow-x-hidden py-12">

    <div class="absolute inset-0 z-0 bg-gradient-to-br from-blue-50 via-white to-[#1EA7E1]/20">
        <div class="absolute inset-0 opacity-40" style="background-image: radial-gradient(#1EA7E1 1px, transparent 1px); background-size: 30px 30px;"></div>
    </div>

    <div class="glass-card mx-4 p-6 md:p-10 rounded-[2.5rem] max-w-md w-full w-[90%] text-center relative z-20">
        <button onclick="window.history.back()" class="absolute top-6 left-6 text-gray-400 hover:text-primary transition bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-sm border border-gray-100">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <img src="logo-cleanforce.png" alt="Cleanforce" class="h-14 mx-auto mb-4 object-contain" onerror="this.style.display='none'">
        <h2 class="text-2xl font-bold font-heading text-[#000080] leading-tight">Welcome</h2>
        <p class="text-xs text-gray-500 mb-6 font-bold mt-1">เข้าสู่ระบบเพื่อดำเนินการต่อ</p>

        <div class="flex border-b border-gray-100 mb-6 relative">
            <button onclick="switchTab('email')" id="tab-email" class="flex-1 py-2 text-sm font-bold border-b-2 border-primary text-primary transition-colors z-10">อีเมล</button>
            <button onclick="switchTab('phone')" id="tab-phone" class="flex-1 py-2 text-sm font-bold border-b-2 border-transparent text-gray-400 transition-colors z-10">เบอร์โทรศัพท์ (OTP)</button>
        </div>

        <div id="form-email" class="space-y-3 mb-6 text-left">
            <div>
                <input type="email" id="email-input" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-primary transition" placeholder="อีเมล (Email)">
            </div>
            <div>
                <input type="password" id="pwd-input" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-primary transition" placeholder="รหัสผ่าน (Password)">
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="loginWithEmail()" id="btn-login" class="flex-1 bg-[#000080] text-white font-bold rounded-xl py-3 shadow-md hover:bg-blue-900 transition text-sm flex justify-center items-center gap-2">เข้าสู่ระบบ</button>
                <button onclick="registerWithEmail()" id="btn-register" class="flex-1 bg-white border-2 border-[#000080] text-[#000080] font-bold rounded-xl py-3 shadow-sm hover:bg-blue-50 transition text-sm flex justify-center items-center gap-2">สร้างบัญชีใหม่</button>
            </div>
        </div>

        <div id="form-phone" class="hidden space-y-3 mb-6 text-left">
            <div id="phone-input-group">
                <div class="flex gap-2">
                    <span class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-3 text-sm font-bold text-gray-600 flex items-center">+66</span>
                    <input type="tel" id="phone-input" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-primary transition" placeholder="เบอร์โทร (ตัด 0 ตัวแรกออก)" maxlength="9">
                </div>
                <button onclick="sendOTP()" id="btn-send-otp" class="w-full mt-3 bg-[#000080] text-white font-bold rounded-xl py-3 shadow-md hover:bg-blue-900 transition text-sm flex justify-center items-center gap-2"><i class="fa-solid fa-paper-plane"></i> ขอรหัส OTP</button>
            </div>
            
            <div id="otp-input-group" class="hidden space-y-3">
                <p class="text-xs text-green-600 font-bold text-center mb-1"><i class="fa-solid fa-check-circle"></i> ส่งรหัส OTP ไปยังเบอร์โทรของคุณแล้ว</p>
                <input type="text" id="otp-input" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-center tracking-[0.5em] text-lg font-bold outline-none focus:border-primary transition" placeholder="รหัส 6 หลัก" maxlength="6">
                <button onclick="verifyOTP()" id="btn-verify-otp" class="w-full bg-[#00C300] hover:bg-[#00a000] text-white font-bold rounded-xl py-3 shadow-md transition text-sm flex justify-center items-center gap-2">ยืนยัน OTP</button>
            </div>
            
            <div id="recaptcha-container"></div>
        </div>

        <div class="flex items-center gap-3 mb-6">
            <div class="h-px bg-gray-200 flex-1"></div>
            <span class="text-[10px] text-gray-400 font-bold uppercase">หรือล็อกอินผ่านโซเชียล</span>
            <div class="h-px bg-gray-200 flex-1"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="loginWithLine()" id="btn-line" class="bg-[#00C300] hover:bg-[#00a000] text-white font-bold rounded-xl py-3 flex justify-center items-center gap-2 transition shadow-sm">
                <i class="fa-brands fa-line text-xl"></i> <span class="text-sm">LINE</span>
            </button>
            <button onclick="loginWithGoogle()" id="btn-google" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold rounded-xl py-3 flex justify-center items-center gap-2 transition shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google"> <span class="text-sm">Google</span>
            </button>
            <button onclick="loginWithApple()" id="btn-apple" class="bg-black hover:bg-gray-800 text-white font-bold rounded-xl py-3 flex justify-center items-center gap-2 transition shadow-sm">
                <i class="fa-brands fa-apple text-xl"></i> <span class="text-sm">Apple</span>
            </button>
            <button onclick="loginWithFacebook()" id="btn-facebook" class="bg-[#1877F2] hover:bg-[#166fe5] text-white font-bold rounded-xl py-3 flex justify-center items-center gap-2 transition shadow-sm">
                <i class="fa-brands fa-facebook text-xl"></i> <span class="text-sm">Facebook</span>
            </button>
        </div>
        
        <p class="text-[11px] text-gray-400 mt-6">เมื่อเข้าสู่ระบบ ถือว่าคุณยอมรับ <a href="#" class="text-primary hover:underline">เงื่อนไขการให้บริการ</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code'); // ดักจับ Code จาก LINE

    if (code) {
        // แอบแสดงหน้าจอโหลด เพื่อให้รู้ว่ากำลังประมวลผล
        Swal.fire({
            title: 'กำลังเข้าสู่ระบบ...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // ส่ง Code ไปให้หลังบ้าน (Cloud Function) ของเราทำงาน
        fetch('https://us-central1-allforce-hub.cloudfunctions.net/lineLoginAuth', { // ลิงก์ API หลังบ้านของคุณ
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code })
        })
        .then(response => response.json())
        .then(data => {
            if (data.customToken) {
                // 🎯 ได้ Custom Token มาแล้ว! สั่งล็อกอินเข้า Firebase ได้เลย (ไม่พัง 100%)
                return auth.signInWithCustomToken(data.customToken);
            } else {
                throw new Error("No custom token received");
            }
        })
        .then((userCredential) => {
            Swal.close();
            // สำเร็จ! พาเข้าสู่ระบบได้เลย
            saveUserAndRedirect(userCredential.user);
        })
        .catch((error) => {
            console.error("Login Error:", error);
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่', 'error');
        });
    }
};

        // 🌟 ดักจับว่าลูกค้าเปิดผ่านแอป LINE หรือไม่
        if (navigator.userAgent.indexOf("Line") > -1) {
            // ถ้าใช่ ให้ล้างหน้าจอแล้วขึ้นคำแนะนำแทน
            document.body.innerHTML = `
                <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F3F7FB; padding:20px; text-align:center; font-family:'Noto Sans Thai', sans-serif;">
                    <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 3rem; color: #000080; margin-bottom: 1rem;"></i>
                    <h2 style="font-size: 1.25rem; font-weight: bold; color: #000080; margin-bottom: 0.5rem;">ระบบความปลอดภัยบล็อกการเข้าสู่ระบบ</h2>
                    <p style="color: #4B5563; font-size: 0.875rem; line-height: 1.5; margin-bottom: 1.5rem;">
                        แอป LINE ไม่อนุญาตให้ล็อกอินผ่านหน้านี้ครับ<br>
                        กรุณากดไอคอน <b>3 จุด (⋮)</b> ที่มุมบนขวา<br>
                        แล้วเลือก <b>"เปิดด้วยเบราว์เซอร์อื่น"</b><br>
                        (Open in external browser)
                    </p>
                    <img src="https://developers.line.biz/assets/img/browser-external-open.png" alt="วิธีเปิดเบราว์เซอร์" style="max-width: 250px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                </div>
            `;
        }
        
        var firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.useDeviceLanguage(); 
        let appVerifier;

        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const fbProvider = new firebase.auth.FacebookAuthProvider();
        const appleProvider = new firebase.auth.OAuthProvider('apple.com');
        const lineProvider = new firebase.auth.OAuthProvider('oidc.line');

        auth.onAuthStateChanged(function(user) {
            if (user) {
                let prevPage = document.referrer;
                if (prevPage && prevPage.includes("profile.html")) window.location.href = "profile.html";
                else window.location.href = "cleanforce.html";
            }
        });

        // 🌟 ตัวดักรอรับลูกค้าเวลากลับมาจากแอป LINE
        auth.getRedirectResult().then((result) => {
            if (result && result.user) {
                saveUserAndRedirect(result.user);
            }
        }).catch((error) => {
            console.error("Redirect Error:", error);
            // ดักจับ Error เผื่อลูกค้ากดยกเลิก
            if(error.code !== 'auth/redirect-cancelled-by-user') {
                Swal.fire({
                    title: 'เชื่อมต่อแอปไม่สำเร็จ',
                    text: 'กรุณาลองใหม่อีกครั้ง หรือเข้าสู่ระบบด้วยอีเมลแทนครับ',
                    icon: 'warning',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#000080'
                });
            }
            // ดัก Error เว้นแต่ลูกค้าจงใจกดยกเลิกเอง
            if(error.code !== 'auth/redirect-cancelled-by-user') {
                Swal.fire('เชื่อมต่อแอปไม่สำเร็จ', 'กรุณาลองใหม่อีกครั้งครับ (' + error.message + ')', 'error');
            }
        let btn = document.getElementById('btn-line');
            if(btn) btn.innerHTML = '<i class="fa-brands fa-line text-xl"></i> <span class="text-sm">LINE</span>';
        });

        function switchTab(tab) {
            document.getElementById('form-email').classList.toggle('hidden', tab !== 'email');
            document.getElementById('form-phone').classList.toggle('hidden', tab !== 'phone');
            
            if(tab === 'email') {
                document.getElementById('tab-email').classList.add('border-primary', 'text-primary');
                document.getElementById('tab-email').classList.remove('border-transparent', 'text-gray-400');
                document.getElementById('tab-phone').classList.add('border-transparent', 'text-gray-400');
                document.getElementById('tab-phone').classList.remove('border-primary', 'text-primary');
            } else {
                document.getElementById('tab-phone').classList.add('border-primary', 'text-primary');
                document.getElementById('tab-phone').classList.remove('border-transparent', 'text-gray-400');
                document.getElementById('tab-email').classList.add('border-transparent', 'text-gray-400');
                document.getElementById('tab-email').classList.remove('border-primary', 'text-primary');
                
                if(!appVerifier) {
                    appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 
                        'size': 'invisible'
                    });
                }
            }
        }

        function sendOTP() {
            let phone = document.getElementById('phone-input').value.trim();
            if(!phone || phone.length < 9) return Swal.fire('แจ้งเตือน', 'กรุณากรอกเบอร์โทรศัพท์ให้ครบถ้วน', 'warning');
            
            let phoneNumber = "+66" + (phone.startsWith("0") ? phone.substring(1) : phone);
            setLoading('btn-send-otp', true);

            auth.signInWithPhoneNumber(phoneNumber, appVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('phone-input-group').classList.add('hidden');
                document.getElementById('otp-input-group').classList.remove('hidden');
                Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'ส่ง SMS สำเร็จ!', showConfirmButton: false, timer: 2000 });
                setLoading('btn-send-otp', false, '<i class="fa-solid fa-paper-plane"></i> ขอรหัส OTP');
            }).catch((error) => {
                console.error(error);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่ง SMS ได้ กรุณาลองใหม่', 'error');
                setLoading('btn-send-otp', false, '<i class="fa-solid fa-paper-plane"></i> ขอรหัส OTP');
                if(appVerifier) {
                    appVerifier.clear();
                    appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
                }
            });
        }

        function verifyOTP() {
            let code = document.getElementById('otp-input').value.trim();
            if(code.length !== 6) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัส OTP 6 หลัก', 'warning');
            
            setLoading('btn-verify-otp', true);
            window.confirmationResult.confirm(code).then((result) => {
                saveUserAndRedirect(result.user);
            }).catch((error) => {
                Swal.fire('รหัสไม่ถูกต้อง', 'รหัส OTP ผิด หรือหมดอายุแล้ว', 'error');
                setLoading('btn-verify-otp', false, 'ยืนยัน OTP');
            });
        }

        function loginWithEmail() {
            let email = document.getElementById('email-input').value;
            let pwd = document.getElementById('pwd-input').value;
            if(!email || !pwd) return Swal.fire('แจ้งเตือน', 'กรุณากรอกอีเมลและรหัสผ่าน', 'warning');
            
            setLoading('btn-login', true);
            auth.signInWithEmailAndPassword(email, pwd)
            .then(res => saveUserAndRedirect(res.user))
            .catch(err => {
                Swal.fire('เข้าสู่ระบบไม่สำเร็จ', 'อีเมลหรือรหัสผ่านไม่ถูกต้องครับ', 'error');
                setLoading('btn-login', false, 'เข้าสู่ระบบ');
            });
        }

        function registerWithEmail() {
            let email = document.getElementById('email-input').value;
            let pwd = document.getElementById('pwd-input').value;
            if(!email || !pwd) return Swal.fire('แจ้งเตือน', 'กรุณากรอกอีเมลและรหัสผ่านที่ต้องการสร้าง', 'warning');
            if(pwd.length < 6) return Swal.fire('แจ้งเตือน', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'warning');
            
            setLoading('btn-register', true);
            auth.createUserWithEmailAndPassword(email, pwd)
            .then(res => saveUserAndRedirect(res.user))
            .catch(err => {
                if(err.code === 'auth/email-already-in-use') Swal.fire('อ๊ะ!', 'อีเมลนี้มีผู้ใช้งานแล้วครับ', 'warning');
                else Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
                setLoading('btn-register', false, 'สร้างบัญชีใหม่');
            });
        }

        function loginWithGoogle() {
            setLoading('btn-google', true);
            auth.signInWithPopup(googleProvider)
            .then(res => saveUserAndRedirect(res.user))
            .catch(err => { showError(err); setLoading('btn-google', false, 'Google'); });
        }

        function loginWithFacebook() {
            setLoading('btn-facebook', true);
            auth.signInWithPopup(fbProvider)
            .then(res => saveUserAndRedirect(res.user))
            .catch(err => { showError(err); setLoading('btn-facebook', false, 'Facebook'); });
        }

        function loginWithApple() {
            setLoading('btn-apple', true);
            auth.signInWithPopup(appleProvider)
            .then(res => saveUserAndRedirect(res.user))
            .catch(err => { showError(err); setLoading('btn-apple', false, 'Apple'); });
        }

        // ฟังก์ชันนี้จะเตะลูกค้าไปหา LINE ทันที
        function loginWithLine() {
            let btn = document.querySelector('button[onclick="loginWithLine()"]');
            if(btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span class="text-sm">กำลังโหลด...</span>';

            const clientId = 'ใส่_LINE_CHANNEL_ID_ของคุณที่นี่';
            const redirectUri = encodeURIComponent('https://all-force.com/login.html'); // ลิงก์เว็บของคุณ
            const state = 'random_string_12345'; // รหัสกันสวมรอย
    
            // ส่งไปขอรหัสลับ (Authorization Code) จาก LINE
            const lineAuthUrl = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}&state=${state}&scope=profile%20openid%20email`;
    
            window.location.href = lineAuthUrl;
        }

        function saveUserAndRedirect(user) {
            let displayName = user.displayName || user.phoneNumber || 'User';
            localStorage.setItem('cf_user', JSON.stringify({ 
                name: displayName, 
                email: user.email, 
                photo: user.photoURL, 
                uid: user.uid 
            }));
        }

        function setLoading(id, isLoading, defaultText = '') {
            let el = document.getElementById(id);
            if(!el) return;
            el.disabled = isLoading;
            el.innerHTML = isLoading ? '<i class="fa-solid fa-spinner fa-spin"></i>' : defaultText;
        }

        function showError(error) {
            console.error(error);
            if(error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
                Swal.fire({ toast: true, position: 'top', icon: 'error', title: 'ไม่สามารถเข้าสู่ระบบได้', text: error.message, showConfirmButton: false, timer: 3000 });
            }
        }
    </script>
</body>
</html>
