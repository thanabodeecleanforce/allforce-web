<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Cleanforce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans Thai', sans-serif; }</style>
</head>
<body class="bg-[#F3F7FB] flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full text-center relative overflow-hidden border border-gray-100">
        <button onclick="window.history.back()" class="absolute top-6 left-6 text-gray-400 hover:text-[#1EA7E1] transition">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </button>

        <img src="logo-cleanforce.png" alt="Cleanforce" class="h-16 mx-auto mb-6 object-contain" onerror="this.src='https://placehold.co/200x80?text=CF'">
        
        <h2 class="text-2xl font-bold text-[#000080] mb-2" style="font-family: 'Poppins', 'Noto Sans Thai', sans-serif;">ยินดีต้อนรับสู่ Cleanforce</h2>
        <p class="text-gray-500 text-sm mb-8">เข้าสู่ระบบเพื่อจัดการจอง ประเมินราคา และรับส่วนลดพิเศษ</p>

        <button id="login-btn" onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 px-6 py-3.5 rounded-xl text-gray-700 font-bold hover:bg-gray-50 transition shadow-sm hover:shadow-md">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5" alt="Google">
            <span>เข้าสู่ระบบด้วย Google</span>
        </button>

        <p class="text-xs text-gray-400 mt-8">การเข้าสู่ระบบแสดงว่าคุณยอมรับเงื่อนไขการให้บริการของเรา</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 2. เช็คสถานะ (ถ้าล็อกอินอยู่แล้ว ให้เด้งกลับ)
        auth.onAuthStateChanged((user) => {
            if (user) {
                let prevPage = document.referrer || "";
                // เช็คให้ครอบคลุมชื่อไฟล์ใหม่
                if (prevPage.includes("cleanforce.html")) {
    window.location.href = "cleanforce.html";
} else if (prevPage.includes("admin.html")) {
    // ...
} else {
    window.location.href = "cleanforce.html"; // หน้าเริ่มต้น

            }}
        });

        // 3. ฟังก์ชันล็อกอิน
        function loginWithGoogle() {
            const loginBtn = document.getElementById('login-btn');
            const btnSpan = loginBtn.querySelector('span');
            
            loginBtn.disabled = true;
            btnSpan.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังเข้าสู่ระบบ...';

            auth.signInWithPopup(provider)
            .then((result) => {
                const user = result.user;
                localStorage.setItem('cf_user', JSON.stringify({
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    uid: user.uid
                }));
                // ไม่ต้องเขียน redirect ตรงนี้ เพราะ onAuthStateChanged ด้านบนจะทำงานอัตโนมัติ
            })
            .catch((error) => {
                console.error("Auth Error: ", error);
                alert("เกิดข้อผิดพลาดในการเข้าสู่ระบบ: " + error.message);
                loginBtn.disabled = false;
                btnSpan.innerHTML = 'เข้าสู่ระบบด้วย Google';
            });
        }
    </script>
</body>
</html>
