<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Cleanforce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full text-center relative overflow-hidden">
        <button onclick="window.history.back()" class="absolute top-6 left-6 text-gray-400 hover:text-blue-600 transition">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </button>

        <img src="logo-cleanforce.png" alt="Cleanforce" class="h-16 mx-auto mb-6 object-contain" onerror="this.src='https://placehold.co/200x80?text=CLEANFORCE'">
        
        <h2 class="text-2xl font-bold text-gray-800 mb-2">ยินดีต้อนรับสู่ Cleanforce</h2>
        <p class="text-gray-500 text-sm mb-8">เข้าสู่ระบบเพื่อจัดการคูปองและดูประวัติการจองของคุณ</p>

        <button id="login-btn" onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 px-6 py-3 rounded-xl text-gray-700 font-bold hover:bg-gray-50 transition shadow-sm hover:shadow-md">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5" alt="Google">
            <span>เข้าสู่ระบบด้วย Google</span>
        </button>

        <p class="text-xs text-gray-400 mt-8">การเข้าสู่ระบบแสดงว่าคุณยอมรับเงื่อนไขการให้บริการของเรา</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCUMp1enqGwuXLhoa-3W6Fro6UfGWCEE70",
            authDomain: "allforce-hub.firebaseapp.com",
            projectId: "allforce-hub",
            storageBucket: "allforce-hub.firebasestorage.app",
            messagingSenderId: "206898849342",
            appId: "1:206898849342:web:35bc0462818da86fb1136f"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // เช็คว่าถ้าล็อกอินอยู่แล้ว ให้เด้งไปหน้าแรกเลย ไม่ต้องกดซ้ำ
        auth.onAuthStateChanged((user) => {
            if (user) {
                // ถ้าต้องการให้กลับไปหน้าที่จากมา (เช่น กดเก็บคูปองแล้วเด้งมาหน้าล็อกอิน พอเสร็จให้เด้งกลับไปหน้าเดิม)
                // ในที่นี้จะให้เด้งกลับไปหน้าหลัก (index.html) ชั่วคราวก่อนครับ
                window.location.href = "index.html"; 
            }
        });

        // 2. ฟังก์ชันเมื่อกดปุ่มล็อกอิน
        function loginWithGoogle() {
            const loginBtn = document.getElementById('login-btn');
            const btnSpan = loginBtn.querySelector('span');
            
            // เปลี่ยนสถานะปุ่มตอนกำลังโหลด
            loginBtn.disabled = true;
            btnSpan.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังเข้าสู่ระบบ...';

            auth.signInWithPopup(provider)
            .then((result) => {
                const user = result.user;
                
                // อัปเดต localStorage (เผื่อไว้ใช้ด่วน)
                localStorage.setItem('cf_user', JSON.stringify({
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    uid: user.uid
                }));

                // เมื่อ onAuthStateChanged ตรวจพบว่า user มาแล้ว มันจะทำการ redirect เอง (ในบล็อกด้านบน)
            })
            .catch((error) => {
                console.error("Error: ", error);
                alert("เกิดข้อผิดพลาดในการเข้าสู่ระบบ กรุณาลองใหม่อีกครั้ง");
                
                // คืนค่าปุ่มกลับมาเหมือนเดิมถ้า Error
                loginBtn.disabled = false;
                btnSpan.innerHTML = 'เข้าสู่ระบบด้วย Google';
            });
        }
    </script>
</body>
</html>
